<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AsanaBar</title>
  <style>
    :root {
      --bg-base: #0a0a0b;
      --bg-card: rgba(28, 28, 32, 0.6);
      --bg-card-hover: rgba(38, 38, 45, 0.7);
      --bg-input: rgba(20, 20, 24, 0.8);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.55);
      --text-tertiary: rgba(255, 255, 255, 0.35);
      --accent: #F06A6A;
      --accent-glow: rgba(240, 106, 106, 0.4);
      --accent-blue: #3B82F6;
      --accent-green: #10B981;
      --accent-orange: #F59E0B;
      --accent-orange-glow: rgba(245, 158, 11, 0.3);
      --accent-red: #EF4444;
      --accent-red-glow: rgba(239, 68, 68, 0.3);
      --gradient-accent: linear-gradient(135deg, #F06A6A 0%, #EC4899 100%);
      --gradient-mesh: radial-gradient(at 0% 0%, rgba(240, 106, 106, 0.15) 0px, transparent 50%),
                       radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
      --radius-sm: 8px;
      --radius-md: 12px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-base: #f5f5f7; --bg-card: rgba(255, 255, 255, 0.8);
        --bg-card-hover: rgba(255, 250, 250, 0.9); --bg-input: rgba(245, 245, 250, 0.9);
        --glass-border: rgba(0, 0, 0, 0.08); --text-primary: rgba(0, 0, 0, 0.9);
        --text-secondary: rgba(0, 0, 0, 0.55); --text-tertiary: rgba(0, 0, 0, 0.35);
        --gradient-mesh: radial-gradient(at 0% 0%, rgba(240, 106, 106, 0.08) 0px, transparent 50%),
                         radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.05) 0px, transparent 50%);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.1);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 13px; background: var(--bg-base); background-image: var(--gradient-mesh);
      color: var(--text-primary); -webkit-font-smoothing: antialiased;
      overflow: hidden; user-select: none; display: flex; flex-direction: column; height: 100vh;
    }

    .header {
      padding: 16px 20px 12px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid var(--glass-border); flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--gradient-accent);
      display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px var(--accent-glow);
    }
    .header-icon svg { width: 16px; height: 16px; fill: white; }
    .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .header-actions { display: flex; gap: 8px; }
    .header-btn {
      width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--bg-card);
      border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease; color: var(--text-secondary);
    }
    .header-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .header-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .header-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
    .header-badge.red { background: var(--accent-red); color: white; }
    .header-badge.orange { background: var(--accent-orange); color: white; }
    .header-badge.blue { background: var(--accent-blue); color: white; }

    .content { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }

    /* SECTION HEADERS */
    .section-head {
      display: flex; align-items: center; gap: 8px; margin: 14px 4px 8px;
      font-size: 11px; font-weight: 700; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .section-head:first-child { margin-top: 2px; }
    .section-count {
      font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 9px;
      background: var(--bg-card); border: 1px solid var(--glass-border); color: var(--text-secondary);
    }
    .section-spacer { flex: 1; }
    .section-action {
      font-size: 11px; font-weight: 600; text-transform: none; letter-spacing: 0;
      color: var(--accent); cursor: pointer; padding: 3px 10px; border-radius: 10px;
      border: 1px solid var(--glass-border); background: var(--bg-card); transition: all 0.2s ease;
    }
    .section-action:hover { background: var(--bg-card-hover); }
    .section-empty { font-size: 12px; color: var(--text-tertiary); padding: 6px 8px 2px; }

    /* CARD (mention or task) */
    .card {
      padding: 12px 14px; background: var(--bg-card); border: 1px solid var(--glass-border);
      border-radius: var(--radius-md); margin-bottom: 8px; cursor: pointer; transition: all 0.2s ease;
    }
    .card:hover { background: var(--bg-card-hover); border-color: rgba(240, 106, 106, 0.25); }
    .card.expanded { border-color: var(--accent); cursor: default; }

    .card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .severity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .severity-dot.error { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red-glow); }
    .severity-dot.warning { background: var(--accent-orange); box-shadow: 0 0 8px var(--accent-orange-glow); }
    .severity-dot.info { background: var(--accent-blue); }
    .card-title { font-weight: 600; font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-time { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }

    .mention-text {
      font-size: 12px; color: var(--text-secondary); line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      word-break: break-word; margin-bottom: 6px; white-space: pre-line;
    }
    .card.expanded .mention-text { -webkit-line-clamp: unset; }

    .card-meta { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-tertiary); flex-wrap: wrap; }
    .card-meta svg { width: 12px; height: 12px; fill: currentColor; vertical-align: -2px; }
    .meta-chip { display: flex; align-items: center; gap: 4px; min-width: 0; }
    .meta-chip span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }

    .badge {
      display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 10px; letter-spacing: 0.3px; white-space: nowrap;
    }
    .badge-late { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
    .badge-today { background: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }
    .badge-done { background: rgba(16, 185, 129, 0.18); color: var(--accent-green); }

    .card-actions { display: flex; gap: 8px; margin-top: 10px; }
    .card-btn {
      flex: 1; padding: 8px 10px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease; border: none; text-align: center;
    }
    .card-btn-primary { background: var(--gradient-accent); color: white; box-shadow: 0 2px 8px var(--accent-glow); }
    .card-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }
    .card-btn-secondary { background: var(--bg-input); color: var(--text-secondary); border: 1px solid var(--glass-border); }
    .card-btn-secondary:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .card-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-tertiary); }
    .empty-state-icon { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.5; }
    .empty-state-icon svg { width: 100%; height: 100%; fill: currentColor; }
    .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
    .empty-state-text { font-size: 12px; line-height: 1.5; }
    .empty-state-link { color: var(--accent); cursor: pointer; }

    /* FOOTER */
    .footer {
      padding: 8px 20px; border-top: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: var(--text-tertiary); flex-shrink: 0;
    }
    .footer-status { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); }
    .status-dot.error { background: var(--accent-red); }
    .status-dot.warning { background: var(--accent-orange); }
    .status-dot.inactive { background: var(--text-tertiary); }
    .restore-link { color: var(--accent); cursor: pointer; }
    .restore-link:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M18.78 12.65a3.22 3.22 0 100 6.44 3.22 3.22 0 000-6.44zm-13.56 0a3.22 3.22 0 100 6.44 3.22 3.22 0 000-6.44zM12 4.91a3.22 3.22 0 100 6.45 3.22 3.22 0 000-6.45z"/></svg>
      </div>
      <span class="header-title">AsanaBar</span>
      <span class="header-badge" id="mentionBadge" style="display:none">0</span>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="refreshBtn" title="Rafraîchir">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
      <button class="header-btn" id="prefsBtn" title="Réglages">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
    </div>
  </div>

  <div class="content" id="mainContent">
    <div class="empty-state">
      <div class="empty-state-icon">
        <svg viewBox="0 0 24 24"><path d="M18.78 12.65a3.22 3.22 0 100 6.44 3.22 3.22 0 000-6.44zm-13.56 0a3.22 3.22 0 100 6.44 3.22 3.22 0 000-6.44zM12 4.91a3.22 3.22 0 100 6.45 3.22 3.22 0 000-6.45z"/></svg>
      </div>
      <div class="empty-state-title">Chargement…</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-status">
      <div class="status-dot inactive" id="statusDot"></div>
      <span id="lastUpdated">Jamais rafraîchi</span>
    </div>
    <span class="restore-link" id="restoreBtn" style="display:none"></span>
  </div>

  <script>
    const bridge = window.asanabar;

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      if (!bridge) return;
      document.getElementById('lastUpdated').textContent = 'Mise à jour…';
      await bridge.asana.refresh();
    });
    document.getElementById('prefsBtn').addEventListener('click', () => {
      if (bridge) bridge.app.showPreferences();
    });
    document.getElementById('restoreBtn').addEventListener('click', async () => {
      if (bridge) await bridge.mentions.restoreAll();
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text == null ? '' : String(text);
      return div.innerHTML;
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const seconds = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
      if (seconds < 0) return '';
      if (seconds < 60) return "à l'instant";
      if (seconds < 3600) return 'il y a ' + Math.floor(seconds / 60) + ' min';
      if (seconds < 86400) return 'il y a ' + Math.floor(seconds / 3600) + ' h';
      return 'il y a ' + Math.floor(seconds / 86400) + ' j';
    }

    function formatDueDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      if (isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
    }

    function localToday() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function configureEmptyState() {
      return `
        <div class="empty-state">
          <div class="empty-state-icon"><svg viewBox="0 0 24 24"><path d="M18.78 12.65a3.22 3.22 0 100 6.44 3.22 3.22 0 000-6.44zm-13.56 0a3.22 3.22 0 100 6.44 3.22 3.22 0 000-6.44zM12 4.91a3.22 3.22 0 100 6.45 3.22 3.22 0 000-6.45z"/></svg></div>
          <div class="empty-state-title">Configurer Asana</div>
          <div class="empty-state-text">Renseigne ton Personal Access Token dans les <span class="empty-state-link" id="goPrefs">réglages</span>.</div>
        </div>`;
    }

    function allClearState() {
      return `
        <div class="empty-state">
          <div class="empty-state-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
          <div class="empty-state-title">All clear !</div>
          <div class="empty-state-text">Aucune mention ni tâche du jour.</div>
        </div>`;
    }

    let isConfigured = false;

    function mentionCard(m) {
      return `
        <div class="card mention-card" data-story="${escapeHtml(m.storyGid)}">
          <div class="card-head">
            <div class="severity-dot error"></div>
            <div class="card-title">${escapeHtml(m.taskName)}</div>
            <div class="card-time">${timeAgo(m.createdAt)}</div>
          </div>
          <div class="mention-text">${escapeHtml(m.text)}</div>
          <div class="card-meta">
            <div class="meta-chip">
              <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
              <span>${escapeHtml(m.author)}</span>
            </div>
            ${m.projectName ? '<div class="meta-chip"><svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg><span>' + escapeHtml(m.projectName) + '</span></div>' : ''}
            ${m.taskCompleted ? '<span class="badge badge-done">Tâche terminée</span>' : ''}
          </div>
          <div class="card-actions">
            <button class="card-btn card-btn-primary" data-open="${escapeHtml(m.url)}">Ouvrir</button>
            <button class="card-btn card-btn-secondary" data-archive="${escapeHtml(m.storyGid)}">Archiver</button>
          </div>
        </div>`;
    }

    function taskCard(t) {
      const badge = t.overdue
        ? '<span class="badge badge-late">En retard · ' + formatDueDate(t.dueOn) + '</span>'
        : '<span class="badge badge-today">Aujourd\'hui</span>';
      return `
        <div class="card task-card" data-task="${escapeHtml(t.gid)}">
          <div class="card-head">
            <div class="severity-dot ${t.overdue ? 'error' : 'warning'}"></div>
            <div class="card-title">${escapeHtml(t.name)}</div>
            ${badge}
          </div>
          <div class="card-meta">
            ${t.projectName ? '<div class="meta-chip"><svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg><span>' + escapeHtml(t.projectName) + '</span></div>' : ''}
          </div>
          <div class="card-actions">
            <button class="card-btn card-btn-secondary" data-copy="${escapeHtml(t.url)}">Copier le lien</button>
            <button class="card-btn card-btn-primary" data-open="${escapeHtml(t.url)}">Ouvrir</button>
          </div>
        </div>`;
    }

    function render(data) {
      const container = document.getElementById('mainContent');
      const badge = document.getElementById('mentionBadge');
      const restoreBtn = document.getElementById('restoreBtn');
      const mentions = data.mentions || [];
      const tasks = data.todayTasks || [];

      if (!isConfigured) {
        container.innerHTML = configureEmptyState();
        const go = document.getElementById('goPrefs');
        if (go) go.addEventListener('click', () => bridge && bridge.app.showPreferences());
        badge.style.display = 'none';
        restoreBtn.style.display = 'none';
        return;
      }

      // Header badge: mentions first (red), else today tasks (orange).
      if (mentions.length > 0) { badge.textContent = mentions.length; badge.className = 'header-badge red'; badge.style.display = 'inline'; }
      else if (tasks.length > 0) { badge.textContent = tasks.length; badge.className = 'header-badge orange'; badge.style.display = 'inline'; }
      else badge.style.display = 'none';

      if (mentions.length === 0 && tasks.length === 0) {
        container.innerHTML = allClearState();
      } else {
        let html = '';
        html += '<div class="section-head">Mentions <span class="section-count">' + mentions.length + '</span></div>';
        html += mentions.length
          ? mentions.map(mentionCard).join('')
          : '<div class="section-empty">Aucune mention non archivée.</div>';

        html += '<div class="section-head">Aujourd\'hui <span class="section-count">' + tasks.length + '</span><span class="section-spacer"></span>'
          + (tasks.length ? '<button class="section-action" id="copyAllBtn">Copier les ' + tasks.length + ' liens</button>' : '')
          + '</div>';
        html += tasks.length
          ? tasks.map(taskCard).join('')
          : '<div class="section-empty">Rien à échéance aujourd\'hui. 🎉</div>';

        container.innerHTML = html;
        wireEvents(container, tasks);
      }

      // Footer: restore archived mentions.
      if (data.archivedCount > 0) {
        restoreBtn.textContent = 'Réafficher les archivées (' + data.archivedCount + ')';
        restoreBtn.style.display = 'inline';
      } else {
        restoreBtn.style.display = 'none';
      }
    }

    function flashButton(btn, label) {
      const original = btn.textContent;
      btn.textContent = label;
      btn.disabled = true;
      setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1200);
    }

    function wireEvents(container, tasks) {
      // Expand/collapse a mention to read the full comment.
      container.querySelectorAll('.mention-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.card-btn')) return;
          card.classList.toggle('expanded');
        });
      });

      container.querySelectorAll('[data-open]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (btn.dataset.open && bridge) bridge.app.openExternal(btn.dataset.open);
        });
      });

      container.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          await bridge.app.copyToClipboard(btn.dataset.copy);
          flashButton(btn, 'Copié ✓');
        });
      });

      container.querySelectorAll('[data-archive]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          btn.disabled = true;
          await bridge.mentions.archive(btn.dataset.archive);
        });
      });

      const copyAll = container.querySelector('#copyAllBtn');
      if (copyAll) {
        copyAll.addEventListener('click', async (e) => {
          e.stopPropagation();
          const links = tasks.map(t => t.url).join('\n');
          await bridge.app.copyToClipboard(links);
          flashButton(copyAll, 'Copiés ✓');
        });
      }
    }

    function updateStatus(data) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('lastUpdated');
      dot.className = 'status-dot';
      if (data.status === 'red') dot.classList.add('error');
      else if (data.status === 'orange') dot.classList.add('warning');
      else if (data.status === 'gray') dot.classList.add('inactive');
      text.textContent = data.error
        ? 'Erreur : ' + data.error
        : 'Mis à jour à ' + new Date(data.lastUpdated).toLocaleTimeString('fr-FR');
    }

    async function init() {
      if (!bridge) return;
      try {
        const cfg = await bridge.config.getAll();
        isConfigured = !!(cfg && cfg.hasAsanaToken && cfg.workspaceGid && cfg.userGid);
      } catch (e) { isConfigured = false; }

      bridge.on.dataUpdated((data) => {
        render(data);
        updateStatus(data);
      });

      // Show cached data immediately, then refresh in the background.
      const cached = await bridge.asana.getData();
      if (cached) { render(cached); updateStatus(cached); }
      await bridge.asana.refresh();
    }

    init();
  </script>
</body>
</html>
